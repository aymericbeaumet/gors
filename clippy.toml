# Clippy configuration for the gors workspace
#
# This file contains workspace-level clippy settings.
# Additional crate-specific settings can be added via #![allow(...)] in lib.rs files.

# Increase the allowed cognitive complexity for complex functions
cognitive-complexity-threshold = 50

# Don't warn about large types in enums - AST nodes can be large
# and boxing everything adds overhead
avoid-breaking-exported-api = true

# Allow longer lines in doc comments for code examples
too-many-lines-threshold = 200
