<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>gors: Go to Rust transpiler</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 24px;
        font-family: system-ui, -apple-system, sans-serif;
        background: #0d1117;
        color: #c9d1d9;
        min-height: 100vh;
      }

      main {
        max-width: 1800px;
        margin: 0 auto;
      }

      header {
        display: flex;
        align-items: baseline;
        gap: 12px;
        margin: 0 0 16px 0;
      }

      header h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
      }

      header h1 a {
        color: #c9d1d9;
        text-decoration: none;
      }

      header h1 a:hover {
        color: #58a6ff;
      }

      header p {
        margin: 0;
        font-size: 13px;
        color: #8b949e;
      }

      .editors {
        display: flex;
        gap: 16px;
        height: calc(100vh - 120px);
        min-height: 400px;
      }

      .editor-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .editor-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        background: #161b22;
        border-radius: 8px 8px 0 0;
        font-size: 12px;
        font-weight: 600;
        height: 36px;
      }

      .editor-header .label {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .editor-header .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      .editor-container.go .dot { background: #00ADD8; }
      .editor-container.rust .dot { background: #FFC832; }

      .editor-header .status {
        font-size: 11px;
        font-weight: 400;
        color: #8b949e;
      }

      .editor-header .status.error {
        color: #f85149;
      }

      .editor-header .status.ok {
        color: #3fb950;
      }

      .editor-wrapper {
        flex: 1;
        position: relative;
        border: 2px solid;
        border-top: none;
        border-radius: 0 0 8px 8px;
        overflow: hidden;
      }

      .editor-container.go .editor-wrapper { border-color: #00ADD8; }
      .editor-container.rust .editor-wrapper { border-color: #FFC832; }

      .editor {
        width: 100%;
        height: 100%;
      }

      .monaco-editor .lines-content {
        padding-left: 5px;
      }

      .copy-button {
        padding: 4px 8px;
        background: transparent;
        border: 1px solid #30363d;
        border-radius: 4px;
        color: #8b949e;
        font-size: 11px;
        font-family: inherit;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 4px;
        transition: all 0.15s ease;
      }

      .copy-button:hover {
        background: #21262d;
        border-color: #8b949e;
        color: #c9d1d9;
      }

      .copy-button.copied {
        background: #238636;
        border-color: #238636;
        color: #ffffff;
      }

      .copy-button svg {
        width: 12px;
        height: 12px;
        fill: currentColor;
      }

      .source-map-highlight {
        background-color: rgba(88, 166, 255, 0.2);
        border-radius: 2px;
      }

    </style>
  </head>
  <body>
    <main>
      <header>
        <h1><a href="https://github.com/aymericbeaumet/gors">gors</a></h1>
        <p>Go to Rust transpiler</p>
      </header>

      <div class="editors">
        <!-- Go Editor -->
        <div class="editor-container go">
          <div class="editor-header">
            <div class="label">
              <span class="dot"></span>
              <span>Go</span>
            </div>
          </div>
          <div class="editor-wrapper">
            <div id="go-editor" class="editor"></div>
          </div>
        </div>

        <!-- Rust Output -->
        <div class="editor-container rust">
          <div class="editor-header">
            <div class="label">
              <span class="dot"></span>
              <span>Rust</span>
            </div>
            <div style="display: flex; align-items: center; gap: 8px;">
              <span id="status" class="status"></span>
              <button id="copy-output" class="copy-button" title="Copy Rust code">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                </svg>
                <span>Copy</span>
              </button>
            </div>
          </div>
          <div class="editor-wrapper">
            <div id="rust-editor" class="editor"></div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
