<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>gors: experimental go compiler</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 24px;
        font-family: system-ui, -apple-system, sans-serif;
        background: #0d1117;
        color: #c9d1d9;
        min-height: 100vh;
      }

      main {
        max-width: 1800px;
        margin: 0 auto;
      }

      main > p {
        margin: 0 0 16px 0;
        font-size: 14px;
      }

      main > p a {
        color: #58a6ff;
        text-decoration: none;
      }

      main > p a:hover {
        text-decoration: underline;
      }

      .workspace {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .editors {
        display: flex;
        gap: 16px;
        height: 500px;
      }

      .editor-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .editor-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        background: #161b22;
        border-radius: 8px 8px 0 0;
        font-size: 12px;
        font-weight: 600;
        height: 36px;
      }

      .editor-header .label {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .editor-header .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      .editor-container.go .dot { background: #00ADD8; }
      .editor-container.rust .dot { background: #FFC832; }

      .editor-wrapper {
        flex: 1;
        position: relative;
        border: 2px solid;
        border-top: none;
        border-radius: 0 0 8px 8px;
        overflow: hidden;
      }

      .editor-container.go .editor-wrapper { border-color: #00ADD8; }
      .editor-container.rust .editor-wrapper { border-color: #FFC832; }

      .editor {
        width: 100%;
        height: 100%;
      }

      .monaco-editor .lines-content {
        padding-left: 5px;
      }

      /* Copy button */
      .copy-button {
        padding: 4px 8px;
        background: transparent;
        border: 1px solid #30363d;
        border-radius: 4px;
        color: #8b949e;
        font-size: 11px;
        font-family: inherit;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 4px;
        transition: all 0.15s ease;
      }

      .copy-button:hover {
        background: #21262d;
        border-color: #8b949e;
        color: #c9d1d9;
      }

      .copy-button.copied {
        background: #238636;
        border-color: #238636;
        color: #ffffff;
      }

      .copy-button svg {
        width: 12px;
        height: 12px;
        fill: currentColor;
      }

      /* Console */
      #console-container {
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 8px;
        overflow: hidden;
      }

      #console-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        background: #161b22;
        border-bottom: 1px solid #30363d;
        font-size: 12px;
        font-weight: 600;
      }

      #console-header .terminal-icon {
        width: 14px;
        height: 14px;
        fill: #8b949e;
      }

      #console {
        font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', 'Fira Mono', 'Roboto Mono', 'Source Code Pro', monospace;
        font-size: 13px;
        padding: 12px;
        min-height: 120px;
        max-height: 200px;
        overflow-y: auto;
        background: #0d1117;
      }

      .console-line {
        display: flex;
        gap: 8px;
        margin-bottom: 4px;
      }

      .console-line .prompt {
        color: #3fb950;
        user-select: none;
      }

      .console-line .command {
        color: #c9d1d9;
      }

      .console-output {
        color: #8b949e;
        white-space: pre-wrap;
        word-break: break-all;
      }

      .console-output.error {
        color: #f85149;
      }

      .console-output.success {
        color: #3fb950;
      }

      /* Error block in console */
      .console-error-block {
        margin-top: 8px;
        padding: 12px;
        background: rgba(248, 81, 73, 0.1);
        border: 1px solid #f85149;
        border-radius: 6px;
        white-space: pre;
        overflow-x: auto;
      }

      .console-error-block .error-location { color: #79c0ff; font-weight: bold; }
      .console-error-block .error-kind { color: #f85149; }
      .console-error-block .error-message { color: #c9d1d9; }
      .console-error-block .error-line-number { color: #7ee787; }
      .console-error-block .error-source { color: #c9d1d9; }
      .console-error-block .error-caret { color: #a5d6ff; }

      /* Formatted error (no border/background) */
      .console-formatted-error {
        white-space: pre;
        overflow-x: auto;
        color: #c9d1d9;
      }

      .console-formatted-error .error-location { color: #79c0ff; }
      .console-formatted-error .error-kind { color: #f85149; }
      .console-formatted-error .error-message { color: #c9d1d9; }
      .console-formatted-error .error-line-number { color: #7ee787; }
      .console-formatted-error .error-source { color: #c9d1d9; }
      .console-formatted-error .error-caret { color: #f85149; }

      /* Source map hover highlighting */
      .source-map-highlight {
        background-color: rgba(88, 166, 255, 0.2);
        border-radius: 2px;
      }

    </style>
  </head>
  <body>
    <main>
      <p><a href="https://github.com/aymericbeaumet/gors">gors</a> is an experimental Go to Rust transpiler.</p>

      <div class="workspace">
        <div class="editors">
          <!-- Go Editor -->
          <div class="editor-container go">
            <div class="editor-header">
              <div class="label">
                <span class="dot"></span>
                <span>Go</span>
              </div>
            </div>
            <div class="editor-wrapper">
              <div id="go-editor" class="editor"></div>
            </div>
          </div>

          <!-- Rust Editor -->
          <div class="editor-container rust">
            <div class="editor-header">
              <div class="label">
                <span class="dot"></span>
                <span>Rust</span>
              </div>
              <button id="copy-rust" class="copy-button" title="Copy Rust code">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                </svg>
                <span>Copy</span>
              </button>
            </div>
            <div class="editor-wrapper">
              <div id="rust-editor" class="editor"></div>
            </div>
          </div>
        </div>

        <!-- Console -->
        <div id="console-container">
          <div id="console-header">
            <svg class="terminal-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8h16v10zm-2-1h-6v-2h6v2zM7.5 17l-1.41-1.41L8.67 13l-2.59-2.59L7.5 9l4 4-4 4z"/>
            </svg>
            <span>Console</span>
          </div>
          <div id="console"></div>
        </div>
      </div>
    </main>
  </body>
</html>
