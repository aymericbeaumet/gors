<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>gors: experimental go compiler</title>

    <style>
      .workspace {
        width: 1012px;
      }

      #input {
        border-width: 3px 1px 3px 1px;
        border-style: solid;
        border-color: #00ADD8;
        overflow: hidden;
      }

      #output {
        border-width: 3px 1px 3px 1px;
        border-style: solid;
        border-color: #FFC832;
        overflow: hidden;
      }

      #input:empty, #output:empty {
        border: 1px dotted gray;
      }

      #output .cursor {
        display: none !important;
      }

      .editors {
        display: flex;
        gap: 12px;
        height: 600px;
      }

      .editors > * {
        width: 500px;
        height: 100%;
      }

      .editors > .output-container {
        position: relative;
      }

      .editors > .output-container > #output {
        width: 100%;
        height: 100%;
      }

      .monaco-editor .lines-content {
        padding-left: 5px;
      }

      #error-container {
        margin-top: 12px;
        border-radius: 4px;
        overflow: hidden;
        border: 1px solid #333;
      }

      #error-container:has(#error:empty) {
        display: none;
      }

      #error-header {
        background: #2d2d2d;
        color: #f14c4c;
        padding: 6px 12px;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 12px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 6px;
        border-bottom: 1px solid #333;
      }

      #error-header::before {
        content: '';
        display: inline-block;
        width: 8px;
        height: 8px;
        background: #f14c4c;
        border-radius: 50%;
      }

      #error {
        font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', 'Fira Mono', 'Roboto Mono', 'Source Code Pro', monospace;
        font-size: 13px;
        margin: 0;
        padding: 12px;
        background: #1e1e1e;
        color: #d4d4d4;
        overflow-x: auto;
        white-space: pre;
      }

      #error:empty {
        display: none;
      }

      #error .error-location {
        color: #9cdcfe;
        font-weight: bold;
      }

      #error .error-kind {
        color: #f14c4c;
      }

      #error .error-message {
        color: #d4d4d4;
      }

      #error .error-line-number {
        color: #6a9955;
      }

      #error .error-source {
        color: #d4d4d4;
      }

      #error .error-caret {
        color: #4ec9b0;
      }

      /* Source map hover highlighting */
      .source-map-highlight {
        background-color: rgba(255, 255, 0, 0.3);
        border-radius: 2px;
      }

      /* Copy button for Rust output */
      .copy-button {
        position: absolute;
        top: 8px;
        right: 8px;
        z-index: 10;
        padding: 6px 10px;
        background: #ffffff;
        border: 1px solid #d0d0d0;
        border-radius: 4px;
        color: #333333;
        font-size: 12px;
        font-family: system-ui, -apple-system, sans-serif;
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.15s ease-in-out, background 0.15s ease-in-out;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .output-container:hover .copy-button {
        opacity: 1;
      }

      .copy-button:hover {
        background: #f0f0f0;
        border-color: #b0b0b0;
      }

      .copy-button:active {
        background: #e0e0e0;
      }

      .copy-button.copied {
        background: #d4edda;
        border-color: #28a745;
        color: #155724;
      }

      .copy-button svg {
        width: 14px;
        height: 14px;
        fill: currentColor;
      }
    </style>
  </head>
  <body>
    <main>
      <p><a href="https://github.com/aymericbeaumet/gors">gors</a> is an experimental Go compiler that generates Rust code.</p>

      <div class="workspace">
        <div class="editors">
          <div id="input"></div>
          <div class="output-container">
            <div id="output"></div>
            <button id="copy-button" class="copy-button" title="Copy Rust code">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
              </svg>
              <span>Copy</span>
            </button>
          </div>
        </div>

        <div id="error-container">
          <div id="error-header">Gors Error</div>
          <pre id="error"></pre>
        </div>
      </div>
    </main>
  </body>
</html>
