<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>gors: experimental go compiler</title>

    <style>
      #input {
        border-width: 3px 1px 1px 1px;
        border-style: solid;
        border-color: #00ADD8;
      }

      #output {
        border-width: 3px 1px 1px 1px;
        border-style: solid;
        border-color: #FFC832;
      }

      #input:empty, #output:empty {
        border: 1px dotted gray;
      }

      #output .cursor {
        display: none !important;
      }

      .editors {
        display: flex;
        gap: 12px;
        height: 600px;
      }

      .editors > * {
        width: 500px;
      }

      .monaco-editor .lines-content {
        padding-left: 5px;
      }

      #error {
        font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', 'Fira Mono', 'Roboto Mono', 'Source Code Pro', monospace;
        font-size: 13px;
        margin-top: 12px;
        padding: 12px;
        background: #1e1e1e;
        color: #d4d4d4;
        border-radius: 4px;
        overflow-x: auto;
        white-space: pre;
      }

      #error:empty {
        display: none;
      }

      #error .error-location {
        color: #9cdcfe;
        font-weight: bold;
      }

      #error .error-kind {
        color: #f14c4c;
      }

      #error .error-message {
        color: #d4d4d4;
      }

      #error .error-line-number {
        color: #6a9955;
      }

      #error .error-source {
        color: #d4d4d4;
      }

      #error .error-caret {
        color: #4ec9b0;
      }
    </style>
  </head>
  <body>
    <main>
      <p><a href="https://github.com/aymericbeaumet/gors">gors</a> is an experimental Go compiler that generates Rust code.</p>

      <div class="editors">
        <div id="input"></div>
        <div id="output"></div>
      </div>

      <pre id="error"></pre>
    </main>
  </body>
</html>
