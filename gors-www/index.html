<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>gors: experimental go compiler</title>

    <style>
      .workspace {
        width: 1012px;
      }

      #input {
        border-width: 3px 1px 3px 1px;
        border-style: solid;
        border-color: #00ADD8;
        overflow: hidden;
      }

      #output {
        border-width: 3px 1px 3px 1px;
        border-style: solid;
        border-color: #FFC832;
        overflow: hidden;
      }

      #input:empty, #output:empty {
        border: 1px dotted gray;
      }

      #output .cursor {
        display: none !important;
      }

      .editors {
        display: flex;
        gap: 12px;
        height: 600px;
      }

      .editors > * {
        width: 500px;
      }

      .monaco-editor .lines-content {
        padding-left: 5px;
      }

      #error-container {
        margin-top: 12px;
        border-radius: 4px;
        overflow: hidden;
        border: 1px solid #333;
      }

      #error-container:has(#error:empty) {
        display: none;
      }

      #error-header {
        background: #2d2d2d;
        color: #f14c4c;
        padding: 6px 12px;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 12px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 6px;
        border-bottom: 1px solid #333;
      }

      #error-header::before {
        content: '';
        display: inline-block;
        width: 8px;
        height: 8px;
        background: #f14c4c;
        border-radius: 50%;
      }

      #error {
        font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', 'Fira Mono', 'Roboto Mono', 'Source Code Pro', monospace;
        font-size: 13px;
        margin: 0;
        padding: 12px;
        background: #1e1e1e;
        color: #d4d4d4;
        overflow-x: auto;
        white-space: pre;
      }

      #error:empty {
        display: none;
      }

      #error .error-location {
        color: #9cdcfe;
        font-weight: bold;
      }

      #error .error-kind {
        color: #f14c4c;
      }

      #error .error-message {
        color: #d4d4d4;
      }

      #error .error-line-number {
        color: #6a9955;
      }

      #error .error-source {
        color: #d4d4d4;
      }

      #error .error-caret {
        color: #4ec9b0;
      }
    </style>
  </head>
  <body>
    <main>
      <p><a href="https://github.com/aymericbeaumet/gors">gors</a> is an experimental Go compiler that generates Rust code.</p>

      <div class="workspace">
        <div class="editors">
          <div id="input"></div>
          <div id="output"></div>
        </div>

        <div id="error-container">
          <div id="error-header">Gors Error</div>
          <pre id="error"></pre>
        </div>
      </div>
    </main>
  </body>
</html>
