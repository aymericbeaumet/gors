name: ci
on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          components: rustfmt, clippy

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

      - name: Run cargo clippy
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Run cargo doc
        run: cargo doc --package=gors

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Run cargo build
        run: cargo build --workspace --all-features --release

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Install Go toolchain
        uses: actions/setup-go@v5
        with:
          go-version: '^1.21'

      - name: Run unit tests
        run: cargo test --workspace --all-features --exclude=gors-cli

      - name: Run integration tests (lexer)
        run: cargo test --workspace --all-features --package=gors-cli lexer -- --nocapture --test-threads=1

      - name: Run integration tests (parser)
        run: cargo test --workspace --all-features --package=gors-cli parser -- --nocapture --test-threads=1

  www:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Install Node.js toolchain
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build gors-wasm
        working-directory: ./gors-wasm
        run: wasm-pack build --release

      - name: Install www dependencies
        working-directory: ./www
        run: npm ci

      - name: Lint www code
        working-directory: ./www
        run: npm run lint

      - name: Build www code
        working-directory: ./www
        run: npm run build

      - name: Upload the build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: www-dist
          path: ./www/dist

  deploy-www:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    needs: [lint, build, test, www]
    steps:
      - uses: actions/checkout@v4

      - name: Download the build artifacts
        uses: actions/download-artifact@v4
        with:
          name: www-dist
          path: ./www/dist

      - name: Deploy www
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: ./www/dist
          clean: true
