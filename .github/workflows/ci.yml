name: ci
on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  rust-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Cache pinned Go SDK
        uses: actions/cache@v4
        with:
          path: ~/.cargo/gors-cache
          key: gors-go-sdk-${{ runner.os }}-${{ hashFiles('.go-version') }}

      - name: Lint
        run: make rust-lint

  rust-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Cache pinned Go SDK
        uses: actions/cache@v4
        with:
          path: ~/.cargo/gors-cache
          key: gors-go-sdk-${{ runner.os }}-${{ hashFiles('.go-version') }}

      - name: Build
        run: make rust-build

  rust-test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Cache pinned Go SDK
        uses: actions/cache@v4
        with:
          path: ~/.cargo/gors-cache
          key: gors-go-sdk-${{ runner.os }}-${{ hashFiles('.go-version') }}

      - name: Test unit
        run: make rust-test-unit

  rust-test-integration-go-repositories:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Cache pinned Go SDK
        uses: actions/cache@v4
        with:
          path: ~/.cargo/gors-cache
          key: gors-go-sdk-${{ runner.os }}-${{ hashFiles('.go-version') }}

      - name: Test integration go repositories
        run: make rust-test-integration-go-repositories

  rust-test-integration-go-spec:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Cache pinned Go SDK
        uses: actions/cache@v4
        with:
          path: ~/.cargo/gors-cache
          key: gors-go-sdk-${{ runner.os }}-${{ hashFiles('.go-version') }}

      - name: Test integration go spec
        run: make rust-test-integration-go-spec

  rust-test-integration-go-stdlib:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Cache pinned Go SDK
        uses: actions/cache@v4
        with:
          path: ~/.cargo/gors-cache
          key: gors-go-sdk-${{ runner.os }}-${{ hashFiles('.go-version') }}

      - name: Test integration go stdlib
        run: make rust-test-integration-go-stdlib

  rust-test-integration-go-programs:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Cache pinned Go SDK
        uses: actions/cache@v4
        with:
          path: ~/.cargo/gors-cache
          key: gors-go-sdk-${{ runner.os }}-${{ hashFiles('.go-version') }}

      - name: Test integration go programs
        run: make rust-test-integration-go-programs

  web-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js toolchain
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Lint web
        run: make web-lint

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Cache pinned Go SDK
        uses: actions/cache@v4
        with:
          path: ~/.cargo/gors-cache
          key: gors-go-sdk-${{ runner.os }}-${{ hashFiles('.go-version') }}

      - name: Install Node.js toolchain
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build web
        run: make web-build

  web-test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js toolchain
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Test unit
        run: make web-test-unit

  web-test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Cache pinned Go SDK
        uses: actions/cache@v4
        with:
          path: ~/.cargo/gors-cache
          key: gors-go-sdk-${{ runner.os }}-${{ hashFiles('.go-version') }}

      - name: Install Node.js toolchain
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Test integration
        run: make web-test-integration PLAYWRIGHT_INSTALL_ARGS="--with-deps chromium"

  # Upload GitHub Pages artifact from web-build
  upload-pages:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [web-build]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Cache pinned Go SDK
        uses: actions/cache@v4
        with:
          path: ~/.cargo/gors-cache
          key: gors-go-sdk-${{ runner.os }}-${{ hashFiles('.go-version') }}

      - name: Install Node.js toolchain
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build web
        run: make web-build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./www/dist

  deploy-www:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [upload-pages]
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Deploy www to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
