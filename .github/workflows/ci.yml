name: ci
on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Run make lint
        run: make lint

      - name: Run make doc
        run: make doc

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Run make build-release
        run: make build-release

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Go toolchain
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Run unit tests
        run: make test-unit

  test-integrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Go toolchain
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Run integration tests (lexer + parser in parallel)
        run: make test-integrations

  www:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Install Node.js toolchain
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd www && npm install

      - name: Build www
        run: cd www && npm run build

      - name: Lint www
        run: cd www && npm run lint

      - name: Upload the build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: www-dist
          path: ./www/dist

  # Deploy website on every push to master (nightly)
  deploy-www:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: [lint, build, test-unit, test-integrations, www]
    steps:
      - uses: actions/checkout@v4

      - name: Download the build artifacts
        uses: actions/download-artifact@v4
        with:
          name: www-dist
          path: ./www/dist

      - name: Deploy www to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: ./www/dist
          clean: true
